<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="/css/main.css" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="alternate" type="application/atom+xml" title="kwlch.dev" href="https://kwlch.dev/feed.xml" />
    <title>{{ title }} - kwlch.dev</title>
  </head>
  <body>
    <header id="site-header">
      <h1>{{ title }}</h1>
      <time datetime="{{ date | date: '%Y-%m-%d' }}">{{ date | date: '%d %B %Y' }}</time>
    </header>
    <article class="blog-post">{{ content }}</article>
    <nav class="blog-nav">
      <a href="/blog/">&larr; back to blog</a>
    </nav>
  </body>
</html>
